<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificate of Completion</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        /* Navbar color palette:
           forestGreen  → #1a5c38  (dark green, text/nav links)
           primary      → #2d7a4f  (mid green, buttons/accents)
           lightGreen   → #e8f5ee  (very light green backgrounds)
           leafGreen    → #3cb371  (brighter green for gradients)
        */

        body {
            font-family: 'Roboto', 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .certificate-container {
            width: 960px;
            height: 650px;
            display: flex;
            overflow: hidden;
            background-color: #ffffff;
            position: relative;
        }

        /* --- Left Sidebar Section (Green) --- */
        .certificate-sidebar {
            flex: 1;
            background: linear-gradient(180deg, #1a5c38 0%, #2d7a4f 50%, #3cb371 100%);
            position: relative;
            overflow: hidden;
            color: #fff;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .certificate-sidebar::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("/images/certificate-reference.png");
            background-size: cover;
            background-position: center;
            opacity: 0.08;
            mix-blend-mode: soft-light;
            pointer-events: none;
        }

        /* Top Ribbon */
        .ribbon {
            position: absolute;
            width: 140px;
            height: 420px;
            background: linear-gradient(180deg, #1d6b42 0%, #155d35 50%, #0f4526 100%);
            clip-path: polygon(0 0, 100% 0, 100% 75%, 50% 67%, 0 75%);
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            z-index: 1;
        }

        /* Premium seal */
        .stamp {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            z-index: 2;
            margin-top: 40px;
        }

        .seal {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.45));
        }

        .seal-scallop {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: repeating-conic-gradient(from 0deg, #3cb371 0 10deg, #2d7a4f 10deg 20deg);
            -webkit-mask: radial-gradient(circle 82px at center, transparent 79px, #000 80px);
            mask: radial-gradient(circle 82px at center, transparent 79px, #000 80px);
            box-shadow: 0 0 24px rgba(60, 179, 113, 0.45), inset 0 0 0 2px rgba(255, 255, 255, 0.25);
        }

        .seal-core {
            position: absolute;
            inset: 16px;
            border-radius: 50%;
            background: radial-gradient(90px 90px at 50% 35%, rgba(255, 255, 255, 0.18), transparent 60%),
                radial-gradient(circle at 50% 55%, #071f12 0%, #071f12 60%, #0a2e1a 100%);
            border: 4px solid rgba(60, 179, 113, 0.55);
            box-shadow: 0 0 28px rgba(60, 179, 113, 0.45),
                inset 0 6px 18px rgba(255, 255, 255, 0.08),
                inset 0 -10px 22px rgba(0, 0, 0, 0.45);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .seal-core::before {
            content: "";
            position: absolute;
            inset: 10px;
            border-radius: 50%;
            box-shadow: 0 0 0 2px rgba(60, 179, 113, 0.8), 0 0 24px 4px rgba(45, 122, 79, 0.6);
            pointer-events: none;
        }

        .seal-svg {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .seal-text {
            fill: #ffffff;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.95;
        }

        .custom-logo {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .custom-logo svg {
            width: 48px;
            height: 48px;
        }

        .certificate-id-sidebar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            letter-spacing: 1px;
            font-weight: 500;
            text-align: center;
            z-index: 2;
            color: rgba(255, 255, 255, 0.9);
        }

        /* --- Right/Main Content Section --- */
        .certificate-content {
            flex: 2;
            padding: 48px 56px 36px 48px;
            display: flex;
            flex-direction: column;
            color: #333;
            position: relative;
        }

        .header-section {
            margin-bottom: 16px;
        }

        .date {
            font-size: 14px;
            color: #666;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .title {
            font-size: 28px;
            color: #000000;
            font-weight: 800;
            letter-spacing: 1px;
            margin-top: 0;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e2e8f0;
            width: fit-content;
        }

        .acknowledgement {
            font-size: 16px;
            margin-bottom: 5px;
            color: #444;
        }

        .recipient-name {
            font-size: 46px;
            color: #000000;
            font-weight: 800;
            margin: 0 0 24px 0;
            line-height: 1.1;
            letter-spacing: -0.01em;
            text-transform: capitalize;
        }

        .completion-details {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 16px;
            color: #444;
        }

        .training-name {
            font-weight: 800;
            color: #000000;
        }

        .provider {
            font-weight: 800;
            color: #000000;
        }

        .description {
            font-size: 14px;
            color: #666;
            line-height: 1.55;
            max-width: 85%;
            margin-bottom: auto;
        }

        /* Signatures */
        .signature-section {
            display: flex;
            justify-content: flex-end;
            margin-top: auto;
            width: 100%;
        }

        .signature-block {
            width: 320px;
            text-align: right;
        }

        .signature-line {
            height: 40px;
            border-bottom: 1px solid #000000;
            margin-bottom: 8px;
        }

        .signer-name {
            font-size: 15px;
            font-weight: 700;
            margin: 0;
            color: #000000;
        }

        .signer-title {
            font-size: 12px;
            color: #666;
            margin: 0;
        }

        /* Certificate ID */
        .certificate-id {
            position: absolute;
            bottom: 20px;
            left: 48px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>

<body>
    <div class="certificate-container">
        <!-- Left Sidebar -->
        <div class="certificate-sidebar">
            <!-- Top Ribbon -->
            <div class="ribbon" aria-hidden="true"></div>

            <!-- Premium seal with curved text -->
            <div class="stamp">
                <div class="seal" aria-hidden="true">
                    <div class="seal-scallop"></div>

                    <div class="seal-core">
                        <!-- Curved text ring -->
                        <svg class="seal-svg" viewBox="0 0 200 200" aria-hidden="true">
                            <defs>
                                <path id="topArc" d="M 40,100 A 60,60 0 1,1 160,100" fill="none" />
                                <path id="bottomArc" d="M 160,100 A 60,60 0 1,1 40,100" fill="none" />
                            </defs>
                            <text class="seal-text">
                                <textPath href="#topArc" startOffset="50%" text-anchor="middle"
                                    dominant-baseline="central">
                                    Queekies •
                                </textPath>
                            </text>
                            <text class="seal-text">
                                <textPath href="#bottomArc" startOffset="50%" text-anchor="middle"
                                    dominant-baseline="central">
                                    Certificate •
                                </textPath>
                            </text>
                        </svg>

                        <!-- Custom Logo -->
                        <div class="custom-logo"
                            style="position: relative; width: 120px; height: 60px; display: flex; align-items: center; justify-content: center;">
                            {{#if logoUrl}}
                            <img src="{{logoUrl}}" alt="Logo"
                                style="max-width: 100%; max-height: 100%; object-fit: contain; object-position: center;" />
                            {{else}}
                            <img src="./img/queekies.png" alt="Logo"
                                style="width: 64px; height: 64px; object-fit: contain; object-position: center; border-radius: 6px;" />
                            {{/if}}
                        </div>
                    </div>
                </div>
            </div>

            <div class="certificate-id-sidebar">
                Certificate ID: {{certificateId}}
            </div>
        </div>

        <!-- Right Content -->
        <div class="certificate-content">
            <div class="header-section">
                <span class="date">DATE: {{completionDate}}</span>
            </div>

            <h1 class="title">CERTIFICATE OF COMPLETION</h1>

            <p class="acknowledgement">This acknowledges that</p>

            <h2 class="recipient-name">{{studentName}}</h2>

            <p class="completion-details">
                has successfully completed the
                <span class="training-name">{{courseName}}</span>
                offered by <span class="provider">{{organizationName}}</span>
            </p>

            <p class="description">
                {{description}}
            </p>

            <div class="signature-section">
                <div class="signature-block">
                    <div class="signature-line"></div>
                    <p class="signer-name">{{signerName}}</p>
                    <p class="signer-title">{{signerTitle}}</p>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
