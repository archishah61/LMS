<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- Background -->
  <rect width="600" height="400" fill="#f0f4f8" rx="15" ry="15"/>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="50" r="80" fill="#e1ebf5"/>
  <circle cx="550" cy="350" r="100" fill="#e1ebf5"/>
  
  <!-- Laptop -->
  <rect x="240" y="200" width="120" height="80" fill="#2563eb" rx="5" ry="5"/>
  <rect x="230" y="200" width="140" height="5" fill="#1d4ed8"/>
  <rect x="235" y="205" width="130" height="70" fill="#ffffff" rx="2" ry="2"/>
  
  <!-- Screen content -->
  <rect x="245" y="215" width="110" height="50" fill="#e5e7eb"/>
  <rect x="255" y="225" width="90" height="5" fill="#9ca3af"/>
  <rect x="255" y="235" width="70" height="5" fill="#9ca3af"/>
  <rect x="255" y="245" width="80" height="5" fill="#9ca3af"/>
  
  <!-- Student 1 (left) -->
  <circle cx="170" cy="180" r="30" fill="#fcd34d"/>
  <circle cx="170" cy="180" r="25" fill="#fdba74"/>
  <rect x="140" y="210" width="60" height="70" fill="#60a5fa" rx="5" ry="5"/>
  
  <!-- Student 2 (right) -->
  <circle cx="430" cy="180" r="30" fill="#a7f3d0"/>
  <circle cx="430" cy="180" r="25" fill="#6ee7b7"/>
  <rect x="400" y="210" width="60" height="70" fill="#f87171" rx="5" ry="5"/>
  
  <!-- Books/notes -->
  <rect x="120" y="260" width="40" height="30" fill="#fef3c7" rx="2" ry="2"/>
  <rect x="125" y="270" width="30" height="2" fill="#d1d5db"/>
  <rect x="125" y="275" width="25" height="2" fill="#d1d5db"/>
  
  <rect x="440" y="260" width="40" height="30" fill="#dbeafe" rx="2" ry="2"/>
  <rect x="445" y="270" width="30" height="2" fill="#d1d5db"/>
  <rect x="445" y="275" width="25" height="2" fill="#d1d5db"/>
  
  <!-- Speech bubbles -->
  <path d="M200 150 L210 170 L220 150 Z" fill="#ffffff"/>
  <rect x="170" y="120" width="80" height="30" fill="#ffffff" rx="10" ry="10"/>
  <rect x="180" y="130" width="60" height="3" fill="#9ca3af"/>
  <rect x="180" y="137" width="40" height="3" fill="#9ca3af"/>
  
  <path d="M390 150 L380 170 L370 150 Z" fill="#ffffff"/>
  <rect x="350" y="120" width="80" height="30" fill="#ffffff" rx="10" ry="10"/>
  <rect x="360" y="130" width="60" height="3" fill="#9ca3af"/>
  <rect x="360" y="137" width="40" height="3" fill="#9ca3af"/>
  
  <!-- Floating icons -->
  <!-- Video icon -->
  <rect x="100" y="90" width="40" height="30" fill="#3b82f6" rx="5" ry="5"/>
  <polygon points="115,95 130,105 115,115" fill="#ffffff"/>
  
  <!-- Document icon -->
  <rect x="460" y="90" width="30" height="40" fill="#f97316" rx="2" ry="2"/>
  <rect x="465" y="100" width="20" height="2" fill="#ffffff"/>
  <rect x="465" y="105" width="15" height="2" fill="#ffffff"/>
  <rect x="465" y="110" width="18" height="2" fill="#ffffff"/>
  <rect x="465" y="115" width="12" height="2" fill="#ffffff"/>
  
  <!-- Chat icon -->
  <rect x="300" y="90" width="40" height="30" fill="#10b981" rx="10" ry="10"/>
  <circle cx="310" cy="105" r="3" fill="#ffffff"/>
  <circle cx="320" cy="105" r="3" fill="#ffffff"/>
  <circle cx="330" cy="105" r="3" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="300" y="50" font-family="Arial" font-size="24" text-anchor="middle" fill="#1e40af" font-weight="bold">Online Learning</text>
</svg>
